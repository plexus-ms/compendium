[tools]
hk = "latest" # Git hooks

[hooks]
postinstall = "hk install --mise"

[tasks.reqlist]
description = "Regenerate standard-reqlist.md from standard.md"
usage = '''
flag "--check" help="Exit non-zero if standard-reqlist.md is stale instead of rewriting it"
'''
run = "./plexus/generate-reqlist.sh ${usage_check:+--check}"
